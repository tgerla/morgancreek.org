<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Site.Title }}</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #1a2e1a;
      color: #f4f1e8;
      font-family: Georgia, "Times New Roman", serif;
      text-align: center;
      padding: 2rem;
    }

    .site-image {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 16 / 9;
      background-color: #2a4a2a;
      border: 2px solid #4a7c4a;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .site-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .site-image.placeholder-only {
      color: #4a7c4a;
      font-size: 0.9rem;
      font-family: sans-serif;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.8rem);
      font-weight: normal;
      letter-spacing: 0.04em;
      line-height: 1.3;
      max-width: 640px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    a {
      color: #cfe8ff;            /* optional: normal link color */
    }

    a:visited {
      color: #f6e58d;            /* light yellow */
    }
  </style>
</head>
<body>
  <div class="site-image placeholder-only">
    <img src="/images/morgan-creek.jpg" alt="A picture of Morgan Creek in the springtime." />
  </div>
  <h1>Morgan Creek Valley Alliance</h1>
  <h3 style="padding-top: 24px;">This site is under construction. Please visit our <a href="https://www.facebook.com/morgancreekvalleyalliance">Facebook page</a> for the latest news.</h3>
</body>
</html>
