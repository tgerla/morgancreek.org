<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <style>
    :root {
      --bg: #1a2e1a;
      --panel: #233d23;
      --panel-border: #3d623d;
      --text: #f4f1e8;
      --muted: #d6dccf;
      --link: #cfe8ff;
      --visited: #f6e58d;
      --accent: #8fbc8f;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      background: radial-gradient(circle at top right, #2a4a2a 0%, var(--bg) 50%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .sidebar {
      width: min(320px, 90vw);
      background: var(--panel);
      border-right: 1px solid var(--panel-border);
      padding: 2rem 1.25rem;
    }

    .sidebar h2 {
      font-size: 1.15rem;
      margin-bottom: 1rem;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .sidebar h2 a {
      color: var(--accent);
      text-decoration: none;
    }

    .sidebar h2 a:hover,
    .sidebar h2 a:focus-visible {
      text-decoration: underline;
      outline: none;
    }

    .sidebar ul {
      list-style: none;
      display: grid;
      gap: 0.55rem;
    }

    .sidebar ul a {
      display: block;
      text-decoration: none;
      color: var(--text);
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0.55rem 0.75rem;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .sidebar ul a:hover,
    .sidebar ul a:focus-visible,
    .sidebar ul a.active {
      background-color: #2d4f2d;
      border-color: var(--panel-border);
      outline: none;
    }

    .content {
      flex: 1;
      padding: 3rem clamp(1rem, 4vw, 3rem);
      max-width: 960px;
    }

    h1 {
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      margin-bottom: 1.25rem;
      letter-spacing: 0.02em;
    }

    .body {
      color: var(--muted);
      line-height: 1.65;
      font-size: 1.08rem;
    }

    .body p + p,
    .body ul,
    .body ol {
      margin-top: 1rem;
    }

    .body ul {
      margin-left: 1.25rem;
      padding-left: 0.9rem;
    }

    .body h4 {
      margin-top: 1.6rem;
    }

    .body h3 {
      margin-top: 1.8rem;
    }

    .body h2 {
      margin-top: 2rem;
    }

    .body dl {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: minmax(180px, 240px) 1fr;
      column-gap: 1rem;
      row-gap: 0.8rem;
      align-items: start;
    }

    .body dt {
      color: var(--text);
      font-weight: 700;
      line-height: 1.4;
    }

    .body dd {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .body a {
      color: var(--link);
    }

    .body a:visited {
      color: var(--visited);
    }

    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--panel-border);
      }

      .content {
        padding-top: 2rem;
      }

      .body dl {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar" aria-label="Site navigation">
    <h2><a href="/">Home</a></h2>
    <ul>
      <li><a class='{{ if eq .RelPermalink "/area-map/" }}active{{ end }}' href="/area-map/">Area Map</a></li>
      <li><a class='{{ if eq .RelPermalink "/history-of-mcv/" }}active{{ end }}' href="/history-of-mcv/">History of MCV</a></li>
      <li><a class='{{ if eq .RelPermalink "/rare-plants-and-animals/" }}active{{ end }}' href="/rare-plants-and-animals/">Rare Plants and Animals</a></li>
      <li><a class='{{ if eq .RelPermalink "/how-can-i-help/" }}active{{ end }}' href="/how-can-i-help/">How Can I Help?</a></li>
      <li><a class='{{ if eq .RelPermalink "/related-links/" }}active{{ end }}' href="/related-links/">Related Links</a></li>
    </ul>
  </aside>

  <main class="content">
    <h1>{{ .Title }}</h1>
    <div class="body">
      {{ .Content }}
    </div>
  </main>
</body>
</html>
